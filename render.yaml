services:
  - type: web
    name: election-simulator-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: ./render_start.sh
    envVars:
      - key: FRONTEND_ORIGINS
        value: https://election-simulator-frontend.onrender.com

  - type: static_site
    name: election-simulator-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://election-simulator-api.onrender.com
